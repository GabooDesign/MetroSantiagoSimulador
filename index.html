<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Desarrollo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
        }

        .container{
            max-width:600px;
            padding:40px;
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            color:#cbd5e1;
            line-height:1.6;
        }

        .badge{
            display:inline-block;
            background:#2563eb;
            padding:10px 20px;
            border-radius:999px;
            margin-bottom:25px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">🚧 Sitio en construcción</div>

        <h1>Página en Desarrollo</h1>

        <p>
            Estamos trabajando en esta sección para ofrecer contenido actualizado
            sobre el proyecto. Vuelve pronto para conocer las novedades.
        </p>
    </div>
</body>
</html>
